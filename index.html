<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Stream</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    background:#020617;
}

.glass{
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.08);
}

#remoteVideo{
    width:100%;
    max-height:78vh;
    background:black;
    border-radius:18px;
    object-fit:contain;
}

.gradient-text{
    background:linear-gradient(90deg,#60a5fa,#a855f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.status-dot{
    width:8px;
    height:8px;
    border-radius:999px;
}

</style>
</head>

<body class="text-white min-h-screen flex flex-col">

<header class="p-6 flex justify-between items-center max-w-6xl mx-auto w-full">

    <div class="flex items-center gap-2">

        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-bold">
            S
        </div>

        <h1 class="text-xl font-bold uppercase">
            Stream<span class="text-blue-500">.</span>
        </h1>

    </div>

    <div id="statusIndicator"
         class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900 border border-slate-800 text-xs font-semibold">

        <div class="status-dot bg-yellow-500"></div>
        INITIALIZING

    </div>

</header>

<main class="flex-1 flex items-center justify-center p-4">

<div id="setupView" class="w-full max-w-md space-y-6">

    <div class="text-center">

        <h2 class="text-4xl font-black gradient-text">
            Instant Connect
        </h2>

        <p class="text-slate-400 mt-2">
            Live screen share between devices
        </p>

    </div>

    <div class="glass rounded-3xl p-6 space-y-6">

        <!-- HOST -->

        <div class="space-y-4">

            <button id="hostBtn"
                    onclick="startHosting()"
                    class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-lg">

                Start Broadcasting

            </button>

            <div id="hostInfo" class="hidden space-y-4">

                <div class="bg-slate-900 rounded-2xl p-4 break-all">

                    <p class="text-xs text-slate-500 uppercase mb-2">
                        Full Share ID
                    </p>

                    <div id="myPeerId"
                         class="font-mono text-sm text-blue-400">
                    </div>

                </div>

                <button onclick="copyID()"
                        class="w-full py-3 rounded-xl bg-blue-600 font-bold">

                    Copy ID

                </button>

                <div class="bg-white p-4 rounded-2xl flex justify-center">
                    <div id="qrcode"></div>
                </div>

            </div>

        </div>

        <div class="flex items-center gap-4">

            <div class="h-px bg-slate-800 flex-1"></div>

            <span class="text-xs text-slate-500">
                OR
            </span>

            <div class="h-px bg-slate-800 flex-1"></div>

        </div>

        <!-- JOIN -->

        <div class="space-y-4">

            <input id="remotePeerId"
                   type="text"
                   placeholder="Paste Host ID"
                   class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 outline-none focus:border-blue-500">

            <button onclick="joinStream()"
                    class="w-full bg-white text-black py-3 rounded-xl font-bold">

                Watch Stream

            </button>

            <button onclick="startQRScanner()"
                    class="w-full bg-purple-600 py-3 rounded-xl font-bold">

                Scan QR Code

            </button>

            <div id="qr-reader"
                 class="hidden overflow-hidden rounded-2xl"></div>

        </div>

    </div>

</div>

<!-- VIDEO -->

<div id="videoView"
     class="hidden w-full max-w-6xl flex flex-col items-center gap-6">

    <video id="remoteVideo"
           autoplay
           playsinline
           webkit-playsinline
           controls></video>

    <button onclick="stopEverything()"
            class="px-8 py-3 rounded-full bg-red-500 font-bold">

        Stop

    </button>

</div>

</main>

<script>

const statusIndicator = document.getElementById("statusIndicator");

const remoteVideo = document.getElementById("remoteVideo");

const setupView = document.getElementById("setupView");

const videoView = document.getElementById("videoView");

let localStream = null;

let currentCall = null;

let peerReady = false;

let isHosting = false;

function setStatus(text,color="green"){

    statusIndicator.innerHTML = `
        <div class="status-dot bg-${color}-500"></div>
        ${text}
    `;
}

function randomID(){

    return "stream-" + Math.random().toString(36).substring(2,12);

}

const peer = new Peer(randomID(),{

    debug:2,

    config:{

        sdpSemantics:'unified-plan',

        iceTransportPolicy:'all',

        iceServers:[

            {
                urls:'stun:stun.l.google.com:19302'
            },

            {
                urls:'stun:global.stun.twilio.com:3478'
            },

            {
                urls:'turn:openrelay.metered.ca:80',
                username:'openrelayproject',
                credential:'openrelayproject'
            },

            {
                urls:'turn:openrelay.metered.ca:443',
                username:'openrelayproject',
                credential:'openrelayproject'
            },

            {
                urls:'turn:openrelay.metered.ca:443?transport=tcp',
                username:'openrelayproject',
                credential:'openrelayproject'
            }

        ]
    }

});

peer.on("open",(id)=>{

    peerReady = true;

    window.fullPeerId = id;

    document.getElementById("myPeerId").innerText = id;

    setStatus("READY","green");

    console.log("Peer Ready:",id);

});

peer.on("error",(err)=>{

    console.error(err);

    setStatus("ERROR","red");

    alert("Peer Error: " + err.type);

});

peer.on("disconnected",()=>{

    setStatus("RECONNECTING","yellow");

    peer.reconnect();

});

peer.on("call",(call)=>{

    console.log("Incoming call");

    if(!isHosting || !localStream){

        console.log("Host stream not ready");

        return;
    }

    currentCall = call;

    call.answer(localStream);

    setupCallEvents(call);

});

async function startHosting(){

    try{

        localStream = await navigator.mediaDevices.getDisplayMedia({

            video:{
                frameRate:24,
                width:{ ideal:1280 },
                height:{ ideal:720 }
            },

            audio:true

        });

        isHosting = true;

        document.getElementById("hostBtn").disabled = true;

        document.getElementById("hostBtn").innerText = "Broadcasting...";

        document.getElementById("hostInfo").classList.remove("hidden");

        generateQR(window.fullPeerId);

        setStatus("WAITING FOR VIEWER","blue");

        localStream.getTracks().forEach(track=>{

            track.onended = ()=>{

                stopEverything();

            };

        });

        console.log("Broadcast started");

    }catch(err){

        console.error(err);

        alert("Screen share denied");

    }

}

async function joinStream(){

    if(!peerReady){

        alert("Peer not ready yet");

        return;
    }

    const hostId = document.getElementById("remotePeerId").value.trim();

    if(!hostId){

        alert("Enter Host ID");

        return;
    }

    connectToHost(hostId);

}

async function createDummyStream(){

    const canvas = document.createElement("canvas");

    canvas.width = 1;
    canvas.height = 1;

    const stream = canvas.captureStream(1);

    return stream;

}

async function connectToHost(hostId){

    try{

        setStatus("CONNECTING","yellow");

        const dummyStream = await createDummyStream();

        const call = peer.call(hostId,dummyStream,{

            metadata:{
                viewer:true
            }

        });

        if(!call){

            alert("Unable to connect");

            return;
        }

        currentCall = call;

        setupCallEvents(call);

    }catch(err){

        console.error(err);

        alert("Connection failed");

    }

}

function setupCallEvents(call){

    let streamReceived = false;

    call.on("stream",(remoteStream)=>{

        console.log("Remote stream received");

        streamReceived = true;

        remoteVideo.srcObject = remoteStream;

        remoteVideo.autoplay = true;

        remoteVideo.playsInline = true;

        remoteVideo.muted = false;

        remoteVideo.setAttribute("playsinline",true);

        remoteVideo.setAttribute("webkit-playsinline",true);

        const playPromise = remoteVideo.play();

        if(playPromise !== undefined){

            playPromise
            .then(()=>{

                console.log("Playback started");

            })
            .catch(err=>{

                console.log("Autoplay blocked",err);

            });

        }

        setupView.classList.add("hidden");

        videoView.classList.remove("hidden");

        setStatus("CONNECTED","green");

    });

    call.on("close",()=>{

        console.log("Call closed");

        if(streamReceived){

            alert("Connection ended");

        }

        stopEverything();

    });

    call.on("error",(err)=>{

        console.error("Call error:",err);

        alert("Streaming error");

        stopEverything();

    });

    setTimeout(()=>{

        if(!streamReceived){

            console.log("No stream received");

            setStatus("STREAM FAILED","red");

            alert("Could not receive stream. Try same WiFi or Chrome browser.");

        }

    },15000);

}

function generateQR(text){

    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"),{

        text:text,

        width:220,
        height:220

    });

}

async function startQRScanner(){

    const qrReader = document.getElementById("qr-reader");

    qrReader.classList.remove("hidden");

    const html5QrCode = new Html5Qrcode("qr-reader");

    try{

        const devices = await Html5Qrcode.getCameras();

        if(!devices.length){

            alert("No camera found");

            return;
        }

        let backCamera = devices[0].id;

        for(const device of devices){

            const label = device.label.toLowerCase();

            if(
                label.includes("back") ||
                label.includes("rear") ||
                label.includes("environment")
            ){

                backCamera = device.id;

            }

        }

        await html5QrCode.start(

            backCamera,

            {
                fps:10,
                qrbox:250
            },

            async(decodedText)=>{

                document.getElementById("remotePeerId").value = decodedText;

                await html5QrCode.stop();

                qrReader.classList.add("hidden");

                connectToHost(decodedText);

            }

        );

    }catch(err){

        console.error(err);

        alert("Camera permission denied");

    }

}

function copyID(){

    navigator.clipboard.writeText(window.fullPeerId);

    alert("Copied");

}

function stopEverything(){

    if(currentCall){

        currentCall.close();

    }

    if(localStream){

        localStream.getTracks().forEach(track=>track.stop());

    }

    location.reload();

}

</script>
</body>
</html>
