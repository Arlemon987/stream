<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stream - Simple P2P Share</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
    body{
        background:#020617;
    }

    .glass{
        background:rgba(255,255,255,0.05);
        backdrop-filter:blur(12px);
        border:1px solid rgba(255,255,255,0.08);
    }

    #remoteVideo{
        width:100%;
        max-height:75vh;
        background:black;
        border-radius:18px;
        object-fit:contain;
    }

    .gradient-text{
        background:linear-gradient(90deg,#60a5fa,#a855f7);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    .status-dot{
        width:8px;
        height:8px;
        border-radius:999px;
        display:inline-block;
    }
</style>
</head>

<body class="text-white min-h-screen flex flex-col">

<header class="p-6 flex justify-between items-center max-w-5xl mx-auto w-full">

    <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold">
            S
        </div>

        <h1 class="text-xl font-bold uppercase">
            Stream<span class="text-blue-500">.</span>
        </h1>
    </div>

    <div id="statusIndicator"
         class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-900 border border-slate-800 text-xs font-semibold">
        <span class="status-dot bg-yellow-500"></span>
        INITIALIZING
    </div>

</header>

<main class="flex-1 flex flex-col justify-center items-center p-4 max-w-5xl mx-auto w-full">

    <div id="setupView" class="w-full max-w-md space-y-6">

        <div class="text-center">
            <h2 class="text-4xl font-black gradient-text">
                Instant Connect
            </h2>

            <p class="text-slate-400 mt-2">
                Share your screen across devices
            </p>
        </div>

        <div class="glass rounded-3xl p-8 space-y-6">

            <!-- HOST -->
            <div class="space-y-4">

                <button id="hostBtn"
                        onclick="startHosting()"
                        class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-lg">
                    Start Broadcasting
                </button>

                <div id="idDisplay"
                     class="hidden bg-slate-900 border border-blue-500/30 rounded-2xl p-4 text-center">

                    <p class="text-xs text-slate-500 uppercase mb-2">
                        Your Full Share ID
                    </p>

                    <div id="myPeerId"
                         class="text-sm break-all font-mono text-blue-400">
                    </div>

                    <button onclick="copyID()"
                            class="mt-4 px-4 py-2 bg-blue-600 rounded-xl text-sm font-bold">
                        Copy ID
                    </button>

                </div>

            </div>

            <div class="flex items-center gap-4">
                <div class="h-px bg-slate-800 flex-1"></div>
                <span class="text-xs text-slate-500">OR</span>
                <div class="h-px bg-slate-800 flex-1"></div>
            </div>

            <!-- VIEWER -->
            <div class="space-y-4">

                <input type="text"
                       id="remotePeerId"
                       placeholder="Paste Full Host ID"
                       class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 outline-none focus:border-blue-500">

                <button onclick="joinStream()"
                        class="w-full bg-white text-black py-3 rounded-xl font-bold">
                    Watch Stream
                </button>

            </div>

        </div>

    </div>

    <!-- VIDEO -->
    <div id="videoView"
         class="hidden w-full flex flex-col items-center gap-6">

        <video id="remoteVideo"
               autoplay
               playsinline
               controls></video>

        <button onclick="stopEverything()"
                class="px-8 py-3 rounded-full bg-red-500 text-white font-bold">
            Stop
        </button>

    </div>

</main>

<script>

const statusIndicator = document.getElementById("statusIndicator");
const setupView = document.getElementById("setupView");
const videoView = document.getElementById("videoView");
const remoteVideo = document.getElementById("remoteVideo");

const myPeerIdDisplay = document.getElementById("myPeerId");
const idDisplay = document.getElementById("idDisplay");

let localStream = null;
let currentCall = null;

function setStatus(text,color="green"){
    statusIndicator.innerHTML = `
        <span class="status-dot bg-${color}-500"></span>
        ${text}
    `;
}

const peer = new Peer({
    debug:2,
    config:{
        iceServers:[
            {
                urls:'stun:stun.l.google.com:19302'
            },
            {
                urls:'stun:global.stun.twilio.com:3478'
            }
        ]
    }
});

peer.on("open",(id)=>{

    console.log("Peer Ready:",id);

    window.fullPeerId = id;

    myPeerIdDisplay.innerText = id;

    setStatus("READY","green");
});

peer.on("error",(err)=>{

    console.error(err);

    alert("Connection Error: " + err.type);

    setStatus("ERROR","red");
});

peer.on("disconnected",()=>{

    setStatus("RECONNECTING","yellow");

    peer.reconnect();
});

peer.on("close",()=>{

    setStatus("CLOSED","red");
});

async function startHosting(){

    try{

        localStream = await navigator.mediaDevices.getDisplayMedia({
            video:true,
            audio:true
        });

        idDisplay.classList.remove("hidden");

        document.getElementById("hostBtn").disabled = true;
        document.getElementById("hostBtn").innerText = "Broadcasting...";

        setStatus("WAITING FOR VIEWER","blue");

        peer.on("call",(call)=>{

            currentCall = call;

            call.answer(localStream);

            setupCallEvents(call);
        });

        localStream.getVideoTracks()[0].addEventListener("ended",()=>{
            stopEverything();
        });

    }catch(err){

        console.error(err);

        alert("Screen sharing permission denied");

    }
}

function joinStream(){

    const hostId = document.getElementById("remotePeerId").value.trim();

    if(!hostId){

        alert("Enter full Host ID");

        return;
    }

    setStatus("CONNECTING","yellow");

    const call = peer.call(hostId,null, {
        metadata:{
            viewer:true
        }
    });

    if(!call){

        alert("Failed to connect");

        return;
    }

    currentCall = call;

    setupCallEvents(call);
}

function setupCallEvents(call){

    call.on("stream",(remoteStream)=>{

        remoteVideo.srcObject = remoteStream;

        remoteVideo.play().catch(()=>{});

        setupView.classList.add("hidden");
        videoView.classList.remove("hidden");

        setStatus("CONNECTED","green");
    });

    call.on("close",()=>{

        alert("Connection closed");

        stopEverything();
    });

    call.on("error",(err)=>{

        console.error(err);

        alert("Stream Error");

        stopEverything();
    });
}

function copyID(){

    navigator.clipboard.writeText(window.fullPeerId);

    alert("ID copied");
}

function stopEverything(){

    if(currentCall){

        currentCall.close();
    }

    if(localStream){

        localStream.getTracks().forEach(track=>track.stop());
    }

    location.reload();
}

</script>

</body>
</html>
